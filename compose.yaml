services:
  readslot:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - readslot-node-modules:/workspace/node_modules
      - readslot-pnpm-store:/pnpm/store
    environment:
      CI: "true"
      PNPM_STORE_DIR: /pnpm/store
      PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium

volumes:
  readslot-node-modules:
  readslot-pnpm-store:
